<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starlight Store — Каталог</title>
    <style>
        /* --- СТИЛИ И ДИЗАЙН-СИСТЕМА (Современный минимализм) --- */
        :root {
            --bg: #ffffff;
            --surface: #f9fafb;
            --text: #111827;
            --text-muted: #6b7280;
            --accent: #000000; /* Стильный черный акцент, как у премиум брендов */
            --accent-hover: #1f2937;
            --border: #e5e7eb;
            --radius: 0px; /* Прямые углы для более строгого/дорогого стиля */
            --gap: 24px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding-bottom: 60px; }

        /* --- ШАПКА САЙТА (NAVBAR) --- */
        header {
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(8px);
            z-index: 100;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .logo { font-size: 20px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; }
        .nav-links { display: flex; gap: 30px; list-style: none; font-size: 14px; font-weight: 500; }
        .nav-links a { color: var(--text); text-decoration: none; transition: opacity 0.2s; }
        .nav-links a:hover { opacity: 0.6; }

        /* --- КНОПКА МЕНЕДЖЕРА (Для наших тестов БД) --- */
        .admin-trigger {
            background: var(--text);
            color: white;
            border: none;
            padding: 8px 16px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
        }

        /* --- ГЛАВНЫЙ БАННЕР (HERO SECTION) --- */
        .hero {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .hero-banner {
            background: #111827;
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 250px;
        }
        .hero-banner h1 { font-size: 32px; font-weight: 400; letter-spacing: 1px; margin-bottom: 12px; }
        .hero-banner p { color: #9ca3af; font-size: 16px; max-width: 500px; }

        /* --- КАТАЛОГ (СЕТКА КАТЕГОРИЙ) --- */
        main { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        .section-title { font-size: 18px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 30px; }
        
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: var(--gap);
        }

        .category-card {
            text-decoration: none;
            color: var(--text);
            cursor: pointer;
            display: block;
        }
        .img-container {
            width: 100%;
            aspect-ratio: 3/4; /* Модное вертикальное соотношение сторон, как в лукбуках */
            background-color: var(--surface);
            overflow: hidden;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }
        .category-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .category-card:hover .category-img {
            transform: scale(1.04);
        }
        .info-row { display: flex; justify-content: space-between; align-items: baseline; }
        .cat-name { font-size: 15px; font-weight: 500; }
        .cat-count { font-size: 13px; color: var(--text-muted); }

        /* --- МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ (СКРЫТО ПО УМОЛЧАНИЮ) --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4);
            display: none; /* Переключается через JS */
            align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: white; padding: 40px; max-width: 400px; width: 100%;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .modal-content h3 { margin-bottom: 20px; font-size: 16px; text-transform: uppercase; letter-spacing: 1px; }
        .form-input {
            width: 100%; padding: 12px; border: 1px solid var(--border); margin-bottom: 16px; font-size: 14px;
        }
        .form-input:focus { outline: 1px solid var(--accent); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-black { background: var(--accent); color: white; border: none; padding: 12px; width: 100%; cursor: pointer; font-size: 14px; }
        .btn-light { background: transparent; border: 1px solid var(--border); padding: 12px; width: 100%; cursor: pointer; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <div class="logo">STARLIGHT</div>
            <ul class="nav-links">
                <li><a href="#">Коллекции</a></li>
                <li><a href="#">О бренде</a></li>
                <li><a href="#">Контакты</a></li>
            </ul>
            <button class="admin-trigger" onclick="toggleModal(true)">+ Добавить</button>
        </div>
    </header>

    <section class="hero">
        <div class="hero-banner">
            <h1>НОВАЯ СТРАНИЦА КАТАЛОГА</h1>
            <p>Управляйте категориями товаров в реальном времени. Все изменения автоматически записываются в базу данных PostgreSQL.</p>
        </div>
    </section>

    <main>
        <h2 class="section-title">Категории товаров</h2>
        <div id="catalogGrid" class="catalog-grid">
            </div>
    </main>

    <div id="modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Новая категория</h3>
            <input type="text" id="catName" class="form-input" placeholder="Название (например: Куртки)">
            <input type="text" id="catImg" class="form-input" placeholder="Ссылка на фото (S3 или Unsplash)">
            <label style="font-size: 13px; display: flex; align-items: center; gap: 8px; margin-bottom: 16px;">
                <input type="checkbox" id="isMain"> Показывать как основную
            </label>
            <div class="modal-buttons">
                <button class="btn-light" onclick="toggleModal(false)">Отмена</button>
                <button class="btn-black" onclick="addCategory()">Сохранить в БД</button>
            </div>
        </div>
    </div>

    <script>
        // Качественная дефолтная заглушка (стильные кроссовки)
        const DEFAULT_IMG = 'https://images.unsplash.com/photo-1491553895911-0055eca6402d?q=80&w=500&auto=format&fit=crop';

        // Открытие/закрытие модалки
        function toggleModal(show) {
            document.getElementById('modal').style.display = show ? 'flex' : 'none';
        }

        // Загрузка категорий из API FastAPI
        async function loadCatalog() {
            try {
                const response = await fetch('/api/categories');
                if (!response.ok) throw new Error('Ошибка при получении данных');
                const categories = await response.json();
                
                const grid = document.getElementById('catalogGrid');
                grid.innerHTML = categories.length === 0 ? '<p style="color: var(--text-muted)">В каталоге пока нет категорий.</p>' : '';
                
                categories.forEach(cat => {
                    const img = cat.image_url ? cat.image_url : DEFAULT_IMG;
                    grid.innerHTML += `
                        <div class="category-card">
                            <div class="img-container">
                                <img src="${img}" class="category-img" alt="${cat.name}" onerror="this.src='${DEFAULT_IMG}'">
                            </div>
                            <div class="info-row">
                                <span class="cat-name">${cat.name}</span>
                                <span class="cat-count">/${cat.slug}</span>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('Ошибка:', error);
            }
        }

        // Сохранение новой категории в БД через API
        async function addCategory() {
            const nameInput = document.getElementById('catName');
            const imgInput = document.getElementById('catImg');
            const isMainInput = document.getElementById('isMain');

            const name = nameInput.value.trim();
            const imageUrl = imgInput.value.trim();
            const isMain = isMainInput.checked;

            if (!name) return alert('Введите название!');

            let url = `/api/categories?name=${encodeURIComponent(name)}&is_main=${isMain}`;
            if (imageUrl) url += `&image_url=${encodeURIComponent(imageUrl)}`;

            try {
                const response = await fetch(url, { method: 'POST' });
                if (response.ok) {
                    // Сброс формы и закрытие окна
                    nameInput.value = '';
                    imgInput.value = '';
                    isMainInput.checked = false;
                    toggleModal(false);
                    
                    // Мгновенное обновление витрины без перезагрузки
                    await loadCatalog();
                } else {
                    alert('Ошибка сервера при сохранении.');
                }
            } catch (error) {
                console.error('Ошибка отправки:', error);
            }
        }

        // Первичный запуск при загрузке страницы
        document.addEventListener('DOMContentLoaded', loadCatalog);
    </script>
</body>
</html>
